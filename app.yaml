# app.yaml
runtime: nodejs20 # Use the latest LTS version of Node supported by GCP

# App Engine routes traffic to port 8080 automatically
env_variables:
  NODE_ENV: 'production'
  # App Engine connects to Cloud SQL via Unix Sockets natively using this path:
  DB_HOST: '/cloudsql/project-e850148f-e9b2-4456-99d:us-central1:your-instance'
  DB_PORT: '5432'
  DB_NAME: 'your_db_name'
  DB_USER: 'your_db_user'
  JWT_EXPIRES_IN: '7d'
  RESET_TOKEN_EXPIRES_MINUTES: '30'
  FROM_EMAIL: 'noreply@yourdomain.com'
  CLOUD_SQL_INSTANCE_CONNECTION_NAME: 'project-e850148f-e9b2-4456-99d:us-central1:your-instance'
