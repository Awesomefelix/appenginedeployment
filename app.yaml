steps:
  - name: 'node:20'
    entrypoint: npm
    args: ['install']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'app'
      - 'deploy'
      - 'app.yaml'
      - '--project=project-e850148f-e9b2-4456-99d'
      - '--quiet'

timeout: '1600s'

options:
  logging: CLOUD_LOGGING_ONLY
  
logsBucket: 'gs://project-e850148f-e9b2-4456-99d_cloudbuild'
