steps:
  # ================= 1. INSTALL DEPENDENCIES =================
  - name: 'node:20'
    entrypoint: npm
    args: ['install']

  # ================= 2. DEPLOY TO APP ENGINE =================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Securely append secrets to the bottom of your app.yaml before deploying
        echo "  DB_PASSWORD: '$$DB_PASSWORD'" >> app.yaml
        echo "  JWT_SECRET: '$$JWT_SECRET'" >> app.yaml
        
        # Run the deployment command
        gcloud app deploy app.yaml --project=project-e850148f-e9b2-4456-99d --quiet
    
    # Links this specific step to the secrets fetched below
    secretEnv: ['DB_PASSWORD', 'JWT_SECRET']

# ================= 3. FETCH SECRETS =================
availableSecrets:
  secretManager:
    - versionName: projects/389077935832/secrets/dev-DB_PASSWORD/versions/latest
      env: 'DB_PASSWORD'
    - versionName: projects/389077935832/secrets/dev-JWT_SECRET/versions/latest
      env: 'JWT_SECRET'

timeout: '1600s'

# ================= 4. FIX LOGGING ERROR =================
options:
  logging: CLOUD_LOGGING_ONLY
