steps:
  # ================= DEPLOY TO CLOUD RUN =================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'gcp-api'
      - '--source=.'
      - '--region=us-central1'
      - '--project=project-e850148f-e9b2-4456-99d'
      - '--allow-unauthenticated'
      
      # Attaches the Cloud SQL instance so your app can communicate with it
      - '--add-cloudsql-instances=project-e850148f-e9b2-4456-99d:us-central1:your-instance'
      
      # Standard Environment Variables
      - '--set-env-vars=NODE_ENV=production,PORT=8080,DB_HOST=/cloudsql/project-e850148f-e9b2-4456-99d:us-central1:your-instance,DB_PORT=5432,DB_NAME=your_db_name,DB_USER=your_db_user,JWT_EXPIRES_IN=7d,RESET_TOKEN_EXPIRES_MINUTES=30,FROM_EMAIL=noreply@yourdomain.com,CLOUD_SQL_INSTANCE_CONNECTION_NAME=project-e850148f-e9b2-4456-99d:us-central1:your-instance'
      
      # Security Best Practice: Pull passwords/keys directly from Google Secret Manager
      - '--set-secrets=DB_PASSWORD=DB_PASSWORD:latest,JWT_SECRET=JWT_SECRET:latest,SENDGRID_API_KEY=SENDGRID_API_KEY:latest'

# Sets a timeout for the build process (optional but recommended)
timeout: '1200s'
